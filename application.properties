# ============================================================
# HealDrive — Spring Boot 3 Configuration
# Fichier : src/main/resources/application.properties
# ============================================================

# ----------------------------------------------------------
# DATASOURCE — PostgreSQL
# ----------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/healdrive
spring.datasource.username=sante_user
spring.datasource.password=VOTRE_MOT_DE_PASSE_ICI
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ----------------------------------------------------------
# JPA / HIBERNATE
# ----------------------------------------------------------
# "validate" : Hibernate vérifie que les entités correspondent
# au schéma existant sans jamais le modifier.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mapping des ENUM PostgreSQL natifs
spring.jpa.properties.hibernate.type.preferred_uuid_mapping=uuid
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Paris

# ----------------------------------------------------------
# JACKSON (JSON)
# ----------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Paris
spring.jackson.property-naming-strategy=SNAKE_CASE

# ----------------------------------------------------------
# SERVEUR
# ----------------------------------------------------------
server.port=8081
server.servlet.context-path=/api

# ----------------------------------------------------------
# LOGGING
# ----------------------------------------------------------
logging.level.root=INFO
logging.level.com.healdrive=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
